version: '3.8'

services:
  # MongoDB - For products, users, auth
  mongodb:
    image: mongo:7.0
    container_name: ecommerce-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: ecommerce
    volumes:
      - mongodb_data:/data/db
      - ./init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    networks:
      - ecommerce-network

  # PostgreSQL - For orders, transactions
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: ecommerce_orders
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-postgres.sql:/docker-entrypoint-initdb.d/init-postgres.sql:ro
    networks:
      - ecommerce-network

  # Redis - For cache, sessions, cart
  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - ecommerce-network

  # API Gateway
  api-gateway:
    build:
      context: ../../
      dockerfile: services/api-gateway/Dockerfile
    container_name: ecommerce-api-gateway
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:3001
      PRODUCT_SERVICE_URL: http://product-service:3002
      CART_SERVICE_URL: http://cart-service:3003
      CHECKOUT_SERVICE_URL: http://checkout-service:3004
      ORDER_SERVICE_URL: http://order-service:3005
      USER_SERVICE_URL: http://user-service:3006
      ALLOWED_ORIGINS: http://localhost:4200,http://localhost:4300,http://localhost:4400
    depends_on:
      - auth-service
      - product-service
      - cart-service
      - checkout-service
      - order-service
      - user-service
    networks:
      - ecommerce-network

  # Auth Service
  auth-service:
    build:
      context: ../../
      dockerfile: services/auth-service/Dockerfile
    container_name: ecommerce-auth-service
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: 3001
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/ecommerce?authSource=admin
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: your-access-secret-key-change-in-production
      JWT_REFRESH_SECRET: your-refresh-secret-key-change-in-production
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
    depends_on:
      - mongodb
      - redis
    networks:
      - ecommerce-network

  # Product Service
  product-service:
    build:
      context: ../../
      dockerfile: services/product-service/Dockerfile
    container_name: ecommerce-product-service
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: development
      PORT: 3002
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/ecommerce?authSource=admin
      REDIS_URL: redis://redis:6379
    depends_on:
      - mongodb
      - redis
    networks:
      - ecommerce-network

  # Cart Service
  cart-service:
    build:
      context: ../../
      dockerfile: services/cart-service/Dockerfile
    container_name: ecommerce-cart-service
    restart: unless-stopped
    ports:
      - "3003:3003"
    environment:
      NODE_ENV: development
      PORT: 3003
      REDIS_URL: redis://redis:6379
      PRODUCT_SERVICE_URL: http://product-service:3002
    depends_on:
      - redis
      - product-service
    networks:
      - ecommerce-network

  # Checkout Service
  checkout-service:
    build:
      context: ../../
      dockerfile: services/checkout-service/Dockerfile
    container_name: ecommerce-checkout-service
    restart: unless-stopped
    ports:
      - "3004:3004"
    environment:
      NODE_ENV: development
      PORT: 3004
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/ecommerce?authSource=admin
      CART_SERVICE_URL: http://cart-service:3003
      ORDER_SERVICE_URL: http://order-service:3005
    depends_on:
      - mongodb
      - cart-service
    networks:
      - ecommerce-network

  # Order Service
  order-service:
    build:
      context: ../../
      dockerfile: services/order-service/Dockerfile
    container_name: ecommerce-order-service
    restart: unless-stopped
    ports:
      - "3005:3005"
    environment:
      NODE_ENV: development
      PORT: 3005
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: ecommerce_orders
    depends_on:
      - postgres
    networks:
      - ecommerce-network

  # User Service
  user-service:
    build:
      context: ../../
      dockerfile: services/user-service/Dockerfile
    container_name: ecommerce-user-service
    restart: unless-stopped
    ports:
      - "3006:3006"
    environment:
      NODE_ENV: development
      PORT: 3006
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/ecommerce?authSource=admin
    depends_on:
      - mongodb
    networks:
      - ecommerce-network

networks:
  ecommerce-network:
    driver: bridge

volumes:
  mongodb_data:
  postgres_data:
  redis_data:

